# ================================================================
# Comprehensive configuration template for SourceCombine
# Lists every available option with default values and explanations.
# ================================================================

# --- Search Parameters ---
search:
  # Paths to scan for files.
  # Replace with one or more folders on the system.
  root_folders:
    - '/path/to/project'

  # Limit folder scanning to this depth (for example, 1 for root files only).
  # Use 0 for no limit.
  max_depth: 0

  # Use 'git ls-files' to find files. This automatically respects the .gitignore
  # and includes both tracked and untracked files. If the folder is not a
  # Git repository, it falls back to standard scanning.
  use_git: false

  # Include only files that have changed in Git.
  use_git_diff: false

  # Include only staged changes in Git (requires use_git_diff: true).
  git_staged: false

  # Include only unstaged and untracked changes in Git (requires use_git_diff: true).
  git_unstaged: false

  # If use_git_diff is true, this finds changes since this commit reference
  # (for example, 'main' or a commit hash). Omit or set to null to find
  # unstaged, staged, and untracked changes.
  git_diff_ref: null

  # Search folders recursively.
  recursive: true

  # Only include files with these extensions. Leave empty to include all.
  # NOTE: This option cannot be used if `pairing.enabled` is true or
  # if any `inclusion_groups` are enabled.
  allowed_extensions: []

  # Only include files of these languages (for example, 'python', 'cpp').
  # See `--list-languages` for a full list. Leave empty to include all.
  allowed_languages: []

  # Skip files of these languages (for example, 'javascript', 'html').
  # See `--list-languages` for a full list. Leave empty to skip none.
  exclude_languages: []

  # Manually map file extensions or filenames to a specific language tag
  # for syntax highlighting.
  # custom_languages:
  #   .mjml: html
  #   .inc: cpp
  #   VERSION: text
  custom_languages: {}

# --- Output Configuration ---
output:
  # Output format (text, json, jsonl, markdown, xml, manifest, csv). Defaults to text.
  format: 'text'

  # When pairing is disabled, all content is written to this file.
  file: 'combined_files.txt'

  # When pairing is enabled, each pair is written to this folder. Omit or set to null
  # to place the .combined files next to their source files.
  folder: null

  # When pairing is enabled, this template determines the name of each
  # combined output file.
  # Available placeholders:
  #   {{STEM}}       - The base name of the file (for example, 'main' from 'main.cpp')
  #   {{SOURCE_EXT}} - The extension of the source file (for example, '.cpp')
  #   {{HEADER_EXT}} - The extension of the header file (for example, '.h')
  #   {{DIR}}        - The relative folder path using forward slashes (or '.' for the root folder)
  #   {{DIR_SLUG}}   - A simplified name for {{DIR}} safe for use in filenames
  #   {{LANG}}       - Detected language of the pair
  #   {{INDEX}}      - The current pair's position in the list (1, 2, 3...)
  #   {{TOTAL}}      - The total number of pairs being processed
  #   Supports all project-level, system, and Git placeholders (for example, {{PROJECT_NAME}}, {{DATE}}).
  paired_filename_template: '{{STEM}}.combined'

  # Example preserving folder structure in the output folder:
  # paired_filename_template: '{{DIR_SLUG}}/{{STEM}}.combined'

  # Add line numbers starting at 1 for each file.
  add_line_numbers: false

  # Include a Table of Contents at the beginning of the combined file.
  # (only when combining many files into one; ignored in JSON format).
  table_of_contents: false

  # Include a visual folder tree at the start of the output file.
  # (only when combining many files into one; ignored in JSON format).
  include_tree: false

  # Add a project overview summary with statistics and language breakdown to the start
  # of the output (only when combining many files into one; ignored in JSON format).
  project_overview: false

  # Include the last N git commit messages in the project overview and templates ({{GIT_LOG}}).
  # Set to 0 to disable.
  git_log_count: 0

  # Include the current Git diff in the project overview and templates ({{GIT_DIFF}} and {{FILE_DIFF}}).
  include_diff: false

  # If true, recreate the input directory structure in the output folder,
  # applying all filtering and processing rules to each file individually.
  mirror: false

  # Template written before each file's content.
  # Placeholders: {{FILENAME}}, {{EXT}}, {{STEM}}, {{DIR}}, {{DIR_SLUG}}, {{SIZE}}, {{TOKENS}}, {{LINE_COUNT}}, {{MODIFIED}}, {{LANG}}, {{HASH}}, {{INDEX}}, {{TOTAL}}, {{GIT_BRANCH}}, {{GIT_COMMIT}}, {{GIT_COMMIT_SHORT}}, {{GIT_TAG}}, {{GIT_AUTHOR}}, {{GIT_AUTHOR_DATE}}, {{GIT_STATUS}}, {{GIT_DIFF}}, {{FILE_AUTHOR}}, {{FILE_AUTHOR_DATE}}, {{FILE_LOG}}, {{FILE_DIFF}}, {{FILE_STATUS}}, {{FILE_URL}}, {{GIT_LOG}}, {{GIT_REMOTE_URL}}, {{PROJECT_URL}}, {{SIZE_PERCENT}}, {{TOKEN_PERCENT}}, {{LINE_PERCENT}}, {{PROJECT_NAME}}, {{PROJECT_VERSION}}, {{PROJECT_DESCRIPTION}}, {{PROJECT_LICENSE}}, {{DATE}}, {{TIME}}, {{DATETIME}}, {{OS}}, {{PYTHON_VERSION}}, {{PLATFORM}}, {{ARCH}}, {{ENV:VAR_NAME}}.
  # Set to null or an empty text to omit the header.
  header_template: "--- {{FILENAME}} ---\n"

  # Template written after each file's content.
  # Placeholders: Same as header_template.
  # Set to null or an empty text to omit the footer/separator.
  footer_template: "\n--- end {{FILENAME}} ---\n"

  # Template written at the very beginning of the combined output file.
  # Placeholders (when combining many files into one): {{FILE_COUNT}}, {{TOTAL_SIZE}}, {{TOTAL_TOKENS}}, {{TOTAL_LINES}}, {{GIT_BRANCH}}, {{GIT_COMMIT}}, {{GIT_COMMIT_SHORT}}, {{GIT_TAG}}, {{GIT_AUTHOR}}, {{GIT_AUTHOR_DATE}}, {{GIT_DIFF}}, {{GIT_LOG}}, {{GIT_STATUS}}, {{GIT_REMOTE_URL}}, {{PROJECT_URL}}, {{PROJECT_NAME}}, {{PROJECT_VERSION}}, {{PROJECT_DESCRIPTION}}, {{PROJECT_LICENSE}}, {{DATE}}, {{TIME}}, {{DATETIME}}, {{OS}}, {{PYTHON_VERSION}}, {{PLATFORM}}, {{ARCH}}, {{ENV:VAR_NAME}}.
  # When pairing, this is written to the start of each paired output file.
  global_header_template: null

  # Template written at the very end of the combined output file.
  # Placeholders: Same as global_header_template.
  # When pairing, this is written to the end of each paired output file.
  global_footer_template: null

  # Optional placeholder to write when a file is skipped because it exceeds
  # filters.max_size_bytes. The text may use placeholders such as {{FILENAME}} and {{SIZE}}.
  max_size_placeholder: null

  # Global sorting options for both combining many files into one and pairing.
  # Choices: name, size, modified (date), tokens, lines, depth (folder), or language.
  sort_by: 'name'

  # If true, sort in descending order.
  sort_reverse: false

  # Save a machine-readable execution summary (file counts, tokens, duration)
  # in JSON format. Use '-' to print it to the terminal.
  summary_json: null

  # Show a colored diff of changes (when using --output, --apply-in-place, or --extract).
  show_diff: false

# --- Project Metadata ---
project:
  # Manual overrides for project metadata used in templates and reports.
  # If omit or set to null, the tool tries to find them in manifest files
  # such as package.json, pyproject.toml, Cargo.toml, composer.json, pom.xml,
  # go.mod, *.gemspec, mix.exs, Package.swift, or README.md.
  name: null
  version: null
  description: null
  license: null
  url: null

# --- File Filtering ---
filters:
  # Skip duplicate files by path or content.
  unique: false

  # Include only files larger than this size.
  # Supports human-readable text such as '10KB', '1.5MB', or raw bytes as an integer.
  min_size_bytes: 0

  # Include only files smaller than this size.
  # Supports human-readable text such as '10KB', '1.5MB', or raw bytes as an integer.
  # Omit, set to null, or set to 0 for no limit (0 is treated as unlimited).
  max_size_bytes: 0

  # Stop processing once you reach the total tokens limit.
  # (only when combining many files or extracting). Omit or set to 0 for no limit.
  max_total_tokens: 0

  # Stop processing once you reach the total size limit.
  # Supports human-readable text such as '10KB', '1.5MB', or raw bytes as an integer.
  # (only when combining many files or extracting). Omit or set to 0 for no limit.
  max_total_size_bytes: 0

  # Stop processing once you reach the total lines limit.
  # (only when combining many files or extracting). Omit or set to 0 for no limit.
  max_total_lines: 0

  # Stop processing after this many files. Omit or set to 0 for no limit.
  max_files: 0

  # Include only files with at least this many tokens. Omit or set to 0 for no limit.
  min_tokens: 0

  # Include only files with at most this many tokens. Omit or set to 0 for no limit.
  max_tokens: 0

  # Include only files with at least this many lines. Omit or set to 0 for no limit.
  min_lines: 0

  # Include only files with at most this many lines. Omit or set to 0 for no limit.
  max_lines: 0

  # Include files modified since this time (for example, '1d', '2h', 'YYYY-MM-DD').
  modified_since: 0

  # Include files modified before this time.
  modified_until: 0

  # If true, skip files that appear to contain binary data (for example, executables, images).
  skip_binary: false

  # Only include files whose content matches this regular expression.
  grep: ""

  # Skip files whose content matches this regular expression.
  exclude_grep: ""

  # --- Inclusion Groups ---
  # Enable specific groups to only include listed filenames or patterns.
  # Cannot be used at the same time with ``search.allowed_extensions``; specify file types within the patterns instead.
  inclusion_groups:
    example_group:
      enabled: false
      filenames: []

  # --- Exclusion Rules ---
  exclusions:
    # Skip files matching patterns.
    # Defaults include: *.pyc, .DS_Store, Thumbs.db, .coverage, .tox, .nox
    filenames:
      - '*.pyc'
      - '*.pyo'
      - '*.pyd'
      - '.DS_Store'
      - 'Thumbs.db'
      - '.coverage'
      - '.tox'
      - '.nox'

    # Exclude folders if any folder name in the path matches one of these
    # patterns. Case-insensitive.
    # Defaults include: .git, __pycache__, node_modules, .venv, dist, build, and other common build folders.
    folders:
      - '.git'
      - '.svn'
      - '.hg'
      - '.cvs'
      - '.idea'
      - '.vscode'
      - '__pycache__'
      - 'node_modules'
      - 'venv'
      - '.venv'
      - 'env'
      - '.env'
      - 'dist'
      - 'build'
      - 'target'
      - 'egg-info'
      - '.egg-info'

# --- Content Processing Options ---
processing:
  compact_whitespace: false       # Compact and clean up whitespace
  # Optional overrides to enable or disable individual whitespace transforms.
  # Keys may be set to true, false, or null (to fall back to compact_whitespace).
  # Supported keys: normalize_line_endings, spaces_to_tabs, trim_spaces_around_tabs,
  # replace_mid_line_tabs, trim_trailing_whitespace, compact_blank_lines,
  # compact_space_runs
  compact_whitespace_groups: {}
  # If true, removes all C-style block comments (/* ... */). This runs *after* remove_initial_c_style_comment.
  remove_all_c_style_comments: false
  # If true, removes only the *first* C-style block comment if it's at the top of the file.
  # This runs *first* and also strips leading whitespace after the comment.
  remove_initial_c_style_comment: false
  line_regex_replacements: []      # Regular expression rules to find and replace content.
  # Example line rule (contiguous matching lines are replaced by a single entry):
  # line_regex_replacements:
  #   - pattern: '^\s*\w+\(0x[0-9a-fA-F]+,\s*0x[0-9a-fA-F]+\),\s*$'
  #     replacement: '<data removed>'
  regex_replacements: []           # Global search-and-replace rules using regular expressions.
  # Example rule:
  # regex_replacements:
  #   - pattern: '^\s*//\s*TODO:.*$'
  #     replacement: ''
  max_lines: 0                     # Shorten each file to this many lines before combining
  max_tokens: 0                    # Shorten each file to this many tokens before combining
  apply_in_place: false            # Apply these processing rules back to the source files
  create_backups: true             # Create .bak backups before rewriting when apply_in_place is true


# --- Pairing Options ---
pairing:
  enabled: false
  include_mismatched: false         # Include files without a pair
  source_extensions: []             # for example, ['.cpp', '.c']
  header_extensions: []             # for example, ['.h', '.hpp']
